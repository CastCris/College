<!DOCTYPE html>
<html>
<head>
    <title>Index</title>
</head>
<body>
    <h1>Bem-vindo ao gerenciador de tarefas super legal e divertido!</h1>
    <button id="add_task">
        ADICIONAR TAREFA
    </button>

    <form>
        <table id="tasks">
        </table>
    </form>
    
    <script>
        class Task
        {
            constructor(name)
            {
                this._id = Date.now();
                this._name = name || "Tarefa não definida";
                this._conclued = 0;
            }

            // getters
            get id()
            {
                return this._id;
            }

            get name()
            {
                return this._name;
            }

            get conclued()
            {
                return this._conclued;
            }

            get json()
            {
                return {
                    "id": this.id,
                    "name": this.name,
                    "conclued": this.conclued
                };
            }


            // setters
            set id(id)
            {
                this._id = id;
            }

            set name(name)
            {
                this._name = name;
            }

            set conclued(conclued)
            {
                this._conclued = conclued;
            }
        }

        class TaskManager
        {
            constructor()
            {
                this._task = {};
                this._tableRow = (task) => `
                <tr id="${task.id}">
                    <td id="task_name">
                        <input value="${task.name}" id="task_name_input">
                    </td>

                    <td id="task_conclued">
                        ${(task.conclued)?"Concluída": "Não concluída"}
                    </td>

                    <td id="task_butt_mark_row">
                        <button id="task_butt_mark">
                            ${(task.conclued)?"Marcar como não concluída": "Marcar como concluída"}
                        </button>
                    </td>

                    <td id="task_remove">
                        <button id="task_butt_remove">
                            Remover
                        </button>
                    </td>
                </tr>
                `
            }

            // getters
            get innerHTML()
            {
                let innerHTML = "";
                for(let i of Object.values(this._task)){
                    innerHTML += this._tableRow(i);
                }

                return `<table>${innerHTML}</table>`;
            }


            get json()
            {
                let json = {};
                for(const i of Object.values(this._task)){
                    json[i.id] = i.json;
                }

                return json;
            }

            // methods
            task(id)
            {
                return this._task[id];
            }

            task_delete(id)
            {
                delete this._task[id];
                this.save_in_localStorage()
            }

            task_add(task)
            {
                this._task[task.id] = task;
                this.save_in_localStorage()
            }

            task_update(id, task)
            {
                if(!(Object.keys(this._task).includes(id)))
                    return;
                this._task[id] = task;
            }


            save_in_localStorage()
            {
                localStorage.setItem("taskManager", JSON.stringify(this.json));
                console.log(JSON.stringify(this.json));
            }

            load_from_localStorage()
            {
                const json_str = localStorage.getItem("taskManager");
                if(!json_str)
                    return;

                const json = JSON.parse(json_str);
                for(const i of Object.values(json)){
                    const task_new = new Task();
                    task_new.id = i.id;
                    task_new.name = i.name;
                    task_new.conclued = i.conclued;

                    this.task_add(task_new);
                }
            }


            generate_id()
            {
                return Date.now();
            }


            put_in_html(table)
            {
                table.innerHTML = this.innerHTML;
                
                const butts_mark = Array.from(document.querySelectorAll("#task_butt_mark"));
                const butts_remove = Array.from(document.querySelectorAll("#task_butt_remove"));
                const inputs_name = Array.from(document.querySelectorAll("#task_name_input"));

                // Buttons mark
                for(const i of butts_mark){
                    i.addEventListener('click', (e) => {
                        let task = e.target;
                        let task_table = e.target;
                        while(task.tagName != "TR"){
                            task = task.parentElement;
                        }

                        while(task_table.tagName != "TABLE"){
                            task_table = task_table.parentElement;
                        }

                        this._task[task.id].conclued = !this._task[task.id].conclued;
                        this.put_in_html(table);
                    });
                }

                // Buttons remove
                for(const i of butts_remove){
                    i.addEventListener('click', (e) => {
                        let task = e.target;
                        let task_table = e.target;
                        while(task.tagName != "TR"){
                            task = task.parentElement;
                        }

                        while(task_table.tagName != "TABLE"){
                            task_table = task_table.parentElement;
                        }

                        // console.log(this._task);
                        // delete this._task[task.id];
                        // console.log(this._task);
                        this.task_delete(task.id);

                        this.put_in_html(table);
                    });
                }

                // Input name field
                for(const i of inputs_name){
                    i.addEventListener('input', (e) => {
                        let task = e.target;
                        let task_table = e.target;
                        while(task.tagName != "TR"){
                            task = task.parentElement;
                        }

                        while(task_table.tagName != "TABLE"){
                            task_table = task_table.parentElement;
                        }

                        const task_element = this._task[task.id];
                        task_element.name = e.target.value;
                        this.save_in_localStorage()
                    });
                }
            }
        }

        //
        const taskManager = new TaskManager();
        const table = document.querySelector("#tasks");
        const butt_add = document.querySelector("#add_task");

        butt_add.addEventListener('click', (e) => {
            taskManager.task_add(new Task("Tarefa sem nome"));
            taskManager.put_in_html(table);

            taskManager.save_in_localStorage();
        });

        taskManager.load_from_localStorage();
        taskManager.put_in_html(table);


    </script>
</body>
