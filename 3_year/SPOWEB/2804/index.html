<!DOCTYPE html>
<html>
<head>
    <title>AAAAAAA</title>
</head>
<body>
    <h1>Bem-vindo ao gerenciador de tarefas super legal e divertido!</h1>
    <button id="add_task">
        ADICIONAR TAREFA
    </button>

    <table id="tasks">
    </table>
    
    <script>
        class Task
        {
            constructor(id, name)
            {
                this._id = id || Date.now();
                this._name = name || "Tarefa não definida";
                this._conclued = 0;
            }

            // getters
            get id()
            {
                return this._id;
            }

            get name()
            {
                return this._name;
            }

            get conclued()
            {
                return this._conclued;
            }

            // setters
            set name(name)
            {
                this._name = name;
            }

            set conclued(conclued)
            {
                this._conclued = conclued;
            }
        }

        class TaskManager
        {
            constructor()
            {
                this._task = {};
                this._tableRow = (task) => `
                <tr id="${task.id}">
                    <td id="task_name">
                        ${task.name}
                    </td>

                    <td id="task_conclued">
                        ${(task.conclued)?"Concluída": "Não concluída"}
                    </td>

                    <td id="task_butt_mark_row">
                        <button id="task_butt_mark">
                            ${(task.conclued)?"Marcar como não concluída": "Marcar como concluída"}
                        </button>
                    </td>

                    <td id="task_remove">
                        <button id="task_butt_remove">
                            Remover
                        </button>
                    </td>
                </tr>
                `
            }

            // getters
            get innerHTML()
            {
                let innerHTML = "";
                for(let i of Object.values(this._task)){
                    innerHTML += this._tableRow(i);
                }

                return `<table>${innerHTML}</table>`;
            }

            // methods
            task(id)
            {
                return this._task[id];
            }

            task_delete(id)
            {
                delete this._task[id];
            }

            task_add(task)
            {
                this._task[task.id] = task;
            }

            task_update(id, task)
            {
                if(!(Object.keys(this._task).includes(id)))
                    return;
                this._task[id] = task;
            }


            generate_id()
            {
                return Date.now();
            }


            put_in_html(table)
            {
                table.innerHTML = this.innerHTML;
                
                const butts_mark = Array.from(document.querySelectorAll("#task_butt_mark"));
                const butts_remove = Array.from(document.querySelectorAll("#task_butt_remove"));

                for(const i of butts_mark){
                    i.addEventListener('click', (e) => {
                        let task = e.target;
                        let table = e.target;
                        while(task.tagName != "TR"){
                            task = task.parentElement;
                        }

                        while(table.tagName != "TABLE"){
                            table = table.parentElement;
                        }

                        this._task[task.id].conclued = !this._task[task.id].conclued;
                        this.put_in_html(table.id);
                    });
                }

                for(const j of butts_remove){
                    j.addEventListener('click', (e) => {
                        let task = e.target;
                        let table = e.target;
                        while(task.tagName != "TR"){
                            task = task.parentElement;
                        }

                        while(table.tagName != "TABLE"){
                            table = table.parentElement;
                        }

                        console.log(this._task);
                        delete this._task[task.id];
                        console.log(this._task);

                        this.put_in_html(table.id);
                    });
                }
            }
        }

        //
        const manager = new TaskManager();
        const table = document.querySelector("#tasks");
        // const butt_add = document.querySelector("#


        console.log(manager.innerHTML);
        manager.put_in_html(table);
    </script>
</body>
