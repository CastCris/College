<!DOCTYPE html>
<html>
<head>
    <title>Product list</title>
</head>
<body>
    <h1>Products</h1>
    <ul>
    {% for i in session.products %}
        <li>
            <h2>{{ i.name }}</h2>
            <p>{{ i.id }}</p>

            <p>{{ i.price }}</p>
        </li>
    {% endfor %}
    </ul>
</body>
